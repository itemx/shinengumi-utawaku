name: Ingest Setlist Submission

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  ingest:
    # 只處理帶 setlist-submission label 的 Issue
    if: contains(github.event.issue.labels.*.name, 'setlist-submission')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Parse and ingest
        id: ingest
        run: python scripts/ingest_issue.py ${{ github.event.issue.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ALLOWED_USERS: ${{ vars.ALLOWED_USERS }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Rebuild stats
        run: python scripts/build_stats.py

      - name: Rebuild known songs
        run: python scripts/build_known_songs.py

      - name: Commit data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "ingest: #${{ github.event.issue.number }}"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Close issue (new data)
        if: steps.commit.outputs.changed == 'true'
        run: gh issue close ${{ github.event.issue.number }} --comment "✅ 已入庫，網站將自動更新。"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Close issue (duplicate)
        if: steps.commit.outputs.changed == 'false'
        run: gh issue close ${{ github.event.issue.number }} --comment "ℹ️ 此影片已收錄，無新資料需要更新。"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
